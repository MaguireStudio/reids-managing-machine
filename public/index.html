<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Spa Elite | Showroom Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-orbitron font-bold tracking-wider text-cyan-400 mb-2">ECO SPA ELITE</h1>
                <p class="text-sm text-slate-400 uppercase tracking-widest font-semibold flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full pulse"></span> 
                    Hydra Engine Online | Showroom Tracker
                </p>
            </div>
            <div class="glass p-4 rounded-xl text-right">
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Status</p>
                <p class="text-cyan-100 font-bold">Showroom is open until 6 PM</p>
            </div>
        </header>

        <!-- Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-6 rounded-2xl border-l-4 border-cyan-500 shadow-xl">
                <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-2">Total Showroom Leads</h3>
                <p id="total-leads" class="text-4xl font-orbitron font-bold text-white">---</p>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-purple-500 shadow-xl">
                <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-2">Sync Status</h3>
                <p id="sync-status" class="text-sm font-bold text-slate-300">Awaiting GAS Link...</p>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500 shadow-xl">
                <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-2">Last Update</h3>
                <p id="last-update" class="text-sm font-bold text-slate-300">Never</p>
            </div>
        </div>

        <!-- Leads Table -->
        <div class="glass rounded-2xl overflow-hidden shadow-2xl border border-white/5">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-xl font-orbitron font-bold text-white">HYDRA LOG [LIVE]</h2>
                <div class="text-xs text-slate-500 font-bold uppercase">Refreshes every 20s</div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-slate-400 text-xs uppercase font-bold tracking-widest">
                        <tr>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Phone</th>
                            <th class="px-6 py-4">Voltage</th>
                            <th class="px-6 py-4">Model</th>
                        </tr>
                    </thead>
                    <tbody id="leads-list" class="divide-y divide-white/5">
                        <!-- Leads injected here -->
                        <tr class="animate-pulse">
                            <td class="px-6 py-8" colspan="4 text-center">Initializing Data Stream...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/leads';

        async function fetchLeads() {
            console.log('Syncing with Hydra Engine...');
            const syncStatusArr = ['Synchronizing...', 'Fetching GAS Logs...', 'Optimizing Tunnel...'];
            document.getElementById('sync-status').innerText = syncStatusArr[Math.floor(Math.random() * syncStatusArr.length)];
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Assuming data is an array: [{"name": "...", "phone": "...", "voltage": "...", "model": "..."}]
                // If data format is different (e.g. {leads: [...]}), adjust accordingly.
                const leads = Array.isArray(data) ? data : (data.leads || []);
                renderLeads(leads);
                
                document.getElementById('total-leads').innerText = leads.length;
                document.getElementById('sync-status').innerText = 'Cloud Bridge Active';
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Fetch Error:', error);
                document.getElementById('sync-status').innerText = 'Bridge Connection Failed';
            }
        }

        function renderLeads(leads) {
            const list = document.getElementById('leads-list');
            if (leads.length === 0) {
                list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-500 italic">No showroom leads detected.</td></tr>';
                return;
            }

            list.innerHTML = leads.map(lead => `
                <tr class="hover:bg-white/5 transition-colors border-b border-white/5">
                    <td class="px-6 py-4 font-semibold text-white tracking-tight">${lead.name || '---'}</td>
                    <td class="px-6 py-4 font-mono text-cyan-400/80">${lead.phone || '---'}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 rounded-md bg-cyan-500/10 text-cyan-400 text-xs font-bold border border-cyan-500/20">${lead.voltage || '---'}V</span></td>
                    <td class="px-6 py-4 text-slate-300 font-medium">${lead.model || '---'}</td>
                </tr>
            `).join('');
        }

        // Initial Load
        fetchLeads();
        // Auto-Refresh (20s)
        setInterval(fetchLeads, 20000);
    </script>
</body>
</html>
